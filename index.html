<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grand Line">
<title>Grand Line Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cabin:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body { height: 100%; background: #fdf6e3; font-family: 'Lora', Georgia, serif; color: #1a0a00; overflow: hidden; }
  #app { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: #e8d5a0; }
  ::-webkit-scrollbar-thumb { background: #c0392b; border-radius: 2px; }
  input, textarea, button { font-family: inherit; -webkit-appearance: none; border-radius: 0; }
  button { cursor: pointer; border: none; background: none; }
  button:active { opacity: 0.75; }
  input:focus, textarea:focus { outline: none; }

  /* Palette:
     Navy:  #0a1628
     Red:   #c0392b
     Gold:  #d4a017
     Cream: #fdf6e3
     Tan:   #e8d5a0
     Ink:   #1a0a00
  */

  @keyframes fadeIn   { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideUp  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes banterIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
  @keyframes encPop   { from { opacity:0; transform:scale(0.93); } to { opacity:1; transform:scale(1); } }
  @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes celeb    { 0%,100% { transform:scale(1) rotate(0deg); } 25% { transform:scale(1.05) rotate(-1deg); } 75% { transform:scale(1.05) rotate(1deg); } }
  @keyframes waveBob  { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-4px); } }

  .fade-in   { animation: fadeIn  0.3s ease forwards; }
  .slide-up  { animation: slideUp 0.35s ease forwards; }
  .banter-in { animation: banterIn 0.3s ease forwards; }
  .enc-pop   { animation: encPop  0.25s ease forwards; }
  .pulsing   { animation: pulse 1.2s ease infinite; }
  .celebrating { animation: celeb 0.7s ease infinite; }
  .wave-bob  { animation: waveBob 2s ease infinite; }

  /* ── Layout ── */
  .view { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding-bottom:85px; }
  .navbar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(10,22,40,0.97); backdrop-filter:blur(12px); border-top:2px solid #d4a017; display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 0 14px; border-top:3px solid transparent; transition:color 0.2s, border-color 0.2s; color:#4a6080; font-family:'Cabin',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; }
  .nav-btn.active { color:#d4a017; border-top-color:#d4a017; }
  .nav-btn .nav-icon { font-size:22px; margin-bottom:2px; }
  .nav-api { width:52px; flex-shrink:0; position:relative; }
  .api-dot { position:absolute; top:9px; right:10px; width:7px; height:7px; border-radius:50%; background:#22c55e; border:1.5px solid #0a1628; }

  /* ── Wanted poster card ── */
  .card { margin:14px 14px 0; background:#fdf6e3; border:2px solid #1a0a00; border-radius:4px; padding:16px; box-shadow:3px 3px 0 #1a0a0033, inset 0 0 0 1px #d4a01744; }
  .card-inner { border:1px solid #d4a017; border-radius:2px; padding:14px; }

  /* ── Page header ── */
  .page-header { background:linear-gradient(170deg, #0a1628 0%, #1a2d4a 60%, #0a1628 100%); padding:calc(env(safe-area-inset-top) + 44px) 20px 22px; text-align:center; border-bottom:3px solid #d4a017; position:relative; overflow:hidden; }
  .header-waves { position:absolute; bottom:0; left:0; right:0; height:8px; background:repeating-linear-gradient(90deg,#d4a017 0,#d4a017 8px,#0a1628 8px,#0a1628 16px); }
  .wanted-label { font-family:'Cabin',sans-serif; font-size:10px; font-weight:700; color:#d4a017; letter-spacing:6px; text-transform:uppercase; margin-bottom:6px; }
  .hero-name { font-family:'Pirata One',cursive; font-size:42px; color:#fdf6e3; line-height:1; text-shadow:2px 2px 0 #c0392b, 4px 4px 0 #1a0a0066; }
  .hero-sub  { font-family:'Cabin',sans-serif; font-size:12px; font-weight:600; color:#d4a017; letter-spacing:2px; text-transform:uppercase; margin-top:6px; margin-bottom:14px; }
  .bounty-row { background:#d4a017; border-radius:3px; padding:5px 12px; display:inline-block; margin-bottom:14px; }
  .bounty-val { font-family:'Pirata One',cursive; font-size:22px; color:#0a1628; }
  .bounty-lbl { font-family:'Cabin',sans-serif; font-size:9px; font-weight:700; color:#0a1628; letter-spacing:2px; }
  .xp-row   { display:flex; align-items:center; gap:10px; }
  .xp-label { font-family:'Cabin',sans-serif; font-size:10px; font-weight:700; color:#d4a01799; }
  .xp-track { flex:1; height:6px; background:rgba(255,255,255,0.1); border-radius:1px; overflow:hidden; border:1px solid #d4a01744; }
  .xp-fill  { height:100%; background:linear-gradient(90deg,#c0392b,#d4a017); transition:width 1s ease; }

  /* ── Section headers ── */
  .section-head { font-family:'Cabin',sans-serif; font-weight:700; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#c0392b; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .section-head::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,#c0392b44,transparent); }

  /* ── Page title areas ── */
  .page-title-area { padding:calc(env(safe-area-inset-top) + 52px) 16px 16px; border-bottom:2px solid #d4a017; background:#0a1628; }
  .page-title { font-family:'Pirata One',cursive; font-size:32px; color:#fdf6e3; }
  .page-sub   { font-family:'Lora',serif; font-style:italic; font-size:13px; color:#d4a01799; margin-top:3px; }

  /* ── Sub-header ── */
  .sub-header { background:#0a1628; padding:calc(env(safe-area-inset-top) + 46px) 16px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid #d4a017; }
  .sub-header-title { font-family:'Pirata One',cursive; color:#fdf6e3; font-size:20px; flex:1; text-align:center; }
  .back-btn { font-family:'Cabin',sans-serif; font-size:12px; font-weight:700; color:#d4a017; padding:4px 0; min-width:60px; letter-spacing:0.5px; }

  /* ── Week grid ── */
  .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:12px; }
  .day-pip { border-radius:3px; padding:5px 0; text-align:center; border:1px solid; }
  .day-label { font-size:9px; font-family:'Cabin',sans-serif; font-weight:700; letter-spacing:0.5px; }
  .day-mark  { font-size:15px; }
  .progress-track { height:6px; background:#e8d5a0; border-radius:1px; overflow:hidden; margin-bottom:6px; border:1px solid #d4a01766; }
  .progress-fill  { height:100%; background:linear-gradient(90deg,#c0392b,#d4a017); transition:width 1s ease; }
  .progress-text  { font-family:'Lora',serif; font-style:italic; font-size:12px; color:#c0392b; text-align:center; }

  /* ── Mission card (contract) ── */
  .mission-card { background:#fdf6e3; border:2px solid #1a0a00; border-radius:3px; margin-bottom:12px; overflow:hidden; box-shadow:2px 2px 0 #1a0a0022; transition:transform 0.15s; }
  .mission-top  { display:flex; align-items:flex-start; gap:12px; padding:14px 14px 10px; }
  .mission-title { font-family:'Pirata One',cursive; font-size:17px; color:#1a0a00; line-height:1.2; }
  .mission-loc   { font-family:'Lora',serif; font-style:italic; font-size:12px; color:#c0392b; margin-top:2px; }
  .tag { font-family:'Cabin',sans-serif; font-size:10px; font-weight:700; border-radius:2px; padding:1px 8px; display:inline-block; letter-spacing:0.5px; }
  .tag-berry { color:#0a1628; background:#d4a017; border:1px solid #0a162833; }
  .tag-type  { color:#fdf6e3; background:#c0392b; border:1px solid #0a162833; }
  .tag-diff  { border:1.5px solid; font-size:10px; padding:1px 7px; font-weight:700; }
  .mission-body { padding:0 14px 14px; border-top:1px dashed #d4a017; animation:fadeIn 0.2s ease; }
  .flavor-text  { font-family:'Lora',serif; font-style:italic; font-size:13px; color:#c0392b; margin:12px 0 8px; padding-left:10px; border-left:3px solid #d4a017; line-height:1.5; }
  .mission-desc { font-family:'Lora',serif; font-size:14px; color:#1a0a00; line-height:1.6; margin-bottom:10px; }
  .criteria-box { background:#fff9e6; border:1px solid #d4a017; border-radius:3px; padding:10px 12px; margin-bottom:10px; }
  .criteria-h   { font-family:'Cabin',sans-serif; font-size:10px; font-weight:700; color:#c0392b; letter-spacing:2px; margin-bottom:4px; text-transform:uppercase; }
  .criteria-t   { font-family:'Lora',serif; font-size:13px; color:#1a0a00; line-height:1.5; }
  .trait-pill   { font-family:'Cabin',sans-serif; font-size:10px; font-weight:700; background:#e8d5a0; color:#1a0a00; border:1px solid #d4a017; border-radius:2px; padding:1px 8px; display:inline-block; margin:2px; }
  .accept-btn   { width:100%; padding:14px; background:#c0392b; color:#fdf6e3; border-radius:3px; font-family:'Pirata One',cursive; font-size:18px; letter-spacing:1px; box-shadow:3px 3px 0 #1a0a00; border:2px solid #1a0a00; }
  .done-tag     { text-align:center; font-family:'Cabin',sans-serif; font-size:12px; font-weight:700; color:#166534; background:#dcfce7; border:1px solid #86efac; border-radius:3px; padding:8px; letter-spacing:1px; text-transform:uppercase; }
  .chevron { color:#d4a017; font-size:14px; flex-shrink:0; margin-left:4px; }

  /* ── Injured banner ── */
  .injured-card { margin:12px 14px 0; background:#fff5f5; border:2px solid #c0392b; border-radius:3px; padding:14px; }
  .injured-h    { font-family:'Cabin',sans-serif; font-weight:700; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#c0392b; margin-bottom:10px; }

  /* ── Stats ── */
  .stats-row { display:flex; gap:10px; margin:14px 14px 0; }
  .stat-box  { flex:1; background:#fdf6e3; border:2px solid #1a0a00; border-radius:3px; padding:12px 8px; text-align:center; box-shadow:2px 2px 0 #1a0a0022; }
  .stat-val  { font-family:'Pirata One',cursive; font-size:26px; color:#c0392b; }
  .stat-lbl  { font-family:'Cabin',sans-serif; font-size:10px; font-weight:700; color:#d4a017; letter-spacing:1px; text-transform:uppercase; margin-top:2px; }

  /* ── Buttons ── */
  .primary-btn { width:100%; padding:15px; background:#c0392b; color:#fdf6e3; border-radius:3px; font-family:'Pirata One',cursive; font-size:20px; letter-spacing:1px; box-shadow:3px 3px 0 #1a0a00; border:2px solid #1a0a00; }
  .primary-btn:disabled { opacity:0.4; box-shadow:none; }
  .ghost-btn  { width:100%; padding:11px; background:none; border:2px solid #d4a017; border-radius:3px; font-family:'Cabin',sans-serif; font-weight:700; font-size:13px; color:#1a0a00; letter-spacing:0.5px; }
  .option-row { display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:3px; margin-bottom:10px; border:2px solid #d4a01766; background:#fdf6e3; width:100%; text-align:left; transition:border-color 0.15s, background 0.15s; }
  .option-row.selected { border-color:#c0392b; background:#fff0ee; }
  .opt-label { font-family:'Cabin',sans-serif; font-weight:700; color:#1a0a00; font-size:15px; }
  .opt-sub   { font-family:'Lora',serif; font-style:italic; font-size:12px; color:#c0392b; }

  /* ── Crew grid ── */
  .crew-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
  .crew-btn  { border-radius:3px; padding:12px 6px; display:flex; flex-direction:column; align-items:center; gap:3px; position:relative; border:2px solid #d4a01766; background:#fdf6e3; transition:all 0.15s; }
  .crew-btn.selected { border-color:var(--cc); background:var(--cc)18; }
  .crew-btn.matched  { border-color:var(--cc)99; background:var(--cc)09; }
  .crew-check { position:absolute; top:3px; right:6px; font-size:13px; font-weight:900; }
  .crew-name  { font-family:'Cabin',sans-serif; font-size:9px; font-weight:700; color:#1a0a00; line-height:1.2; text-align:center; letter-spacing:0.3px; }
  .crew-role  { font-size:9px; font-family:'Lora',serif; font-style:italic; color:#c0392b; }
  .crew-match { font-size:9px; }

  /* ── Crew detail rows ── */
  .crew-row  { margin:0 14px 12px; border-radius:3px; padding:14px; display:flex; gap:14px; border:2px solid #1a0a0022; background:#fdf6e3; box-shadow:2px 2px 0 #1a0a0011; }
  .crew-icon-box { width:54px; height:54px; border-radius:3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:30px; border:2px solid; }
  .hp-track  { height:5px; background:#e8d5a0; border-radius:1px; overflow:hidden; margin:4px 0 6px; }
  .hp-fill   { height:100%; border-radius:1px; transition:width 0.8s ease; }

  /* ── Quest header ── */
  .quest-header { background:linear-gradient(170deg,#0a1628,#1a2d4a); padding:calc(env(safe-area-inset-top) + 44px) 14px 12px; flex-shrink:0; border-bottom:3px solid #d4a017; }
  .quest-title  { font-family:'Pirata One',cursive; color:#fdf6e3; font-size:20px; line-height:1.2; }
  .quest-loc    { font-family:'Lora',serif; font-style:italic; color:#d4a01799; font-size:12px; margin-top:2px; }
  .quest-timer  { font-family:'Cabin',sans-serif; font-weight:700; color:#d4a017; font-size:11px; letter-spacing:1px; }
  .quest-bonus  { font-family:'Pirata One',cursive; color:#c0392b; font-size:14px; margin-top:2px; }
  .milestone-bar { display:flex; gap:4px; margin-top:10px; }
  .ms-pip { flex:1; height:5px; border-radius:1px; transition:background 0.4s; }

  /* ── Quest feed ── */
  .quest-view { display:flex; flex-direction:column; height:100%; overflow:hidden; }
  .quest-feed { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 14px 0; }

  .story-card    { background:#fdf6e3; border:2px solid #1a0a00; border-radius:3px; padding:16px; margin-bottom:12px; box-shadow:2px 2px 0 #1a0a0022; }
  .milestone-card { background:#fff9e6; border:2px solid #d4a017; border-radius:3px; padding:14px; margin-bottom:10px; }
  .ms-label { font-family:'Cabin',sans-serif; font-weight:700; color:#d4a017; font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; }
  .ms-story { font-family:'Lora',serif; font-size:15px; color:#1a0a00; line-height:1.6; }

  .banter-msg { background:#fdf6e3; border:1px solid #d4a01744; border-left:4px solid; border-radius:0 6px 6px 0; padding:12px; margin-bottom:10px; }
  .banter-who { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  .banter-name { font-family:'Cabin',sans-serif; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
  .banter-text { font-family:'Lora',serif; font-style:italic; font-size:14px; color:#1a0a00; line-height:1.55; }

  .player-msg  { background:#fff9e6; border:2px solid #d4a017; border-radius:6px 6px 0 6px; padding:10px 14px; margin-bottom:10px; }
  .player-who  { font-family:'Cabin',sans-serif; font-size:10px; font-weight:700; color:#c0392b; letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }

  .enc-result  { background:#f0f9ff; border:2px solid #0369a1; border-radius:3px; padding:12px; margin-bottom:10px; }
  .enc-res-h   { font-family:'Cabin',sans-serif; font-size:10px; font-weight:700; color:#0369a1; letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
  .sys-msg     { font-family:'Lora',serif; font-style:italic; font-size:12px; color:#d4a017; text-align:center; padding:6px; }

  /* ── Quest footer ── */
  .quest-footer { flex-shrink:0; background:rgba(253,246,227,0.97); backdrop-filter:blur(10px); border-top:2px solid #d4a017; padding:10px 14px calc(env(safe-area-inset-bottom) + 10px); }
  .chat-row     { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .chat-input   { flex:1; padding:11px 14px; background:#fdf6e3; border:2px solid #d4a01766; border-radius:24px; font-family:'Lora',serif; font-size:15px; color:#1a0a00; }
  .chat-input:focus { border-color:#c0392b; }
  .send-btn     { width:42px; height:42px; border-radius:50%; background:#c0392b; color:#fdf6e3; font-size:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border:2px solid #1a0a00; }
  .send-btn:disabled { opacity:0.35; }
  .ms-action    { display:flex; gap:8px; }
  .ms-cue       { font-family:'Lora',serif; font-style:italic; font-size:13px; color:#c0392b; text-align:center; margin-bottom:5px; }
  .ms-advance   { flex:1; padding:12px; background:#c0392b; color:#fdf6e3; border-radius:3px; font-family:'Pirata One',cursive; font-size:16px; border:2px solid #1a0a00; box-shadow:2px 2px 0 #1a0a00; }
  .quit-btn     { padding:0 14px; background:none; border:2px solid #d4a01766; border-radius:3px; font-family:'Cabin',sans-serif; font-weight:700; font-size:11px; color:#1a0a00; letter-spacing:0.5px; }

  /* ── Encounter overlay ── */
  .enc-overlay { position:fixed; inset:0; background:rgba(10,22,40,0.85); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; }
  .enc-card    { background:#fdf6e3; border:3px solid #d4a017; border-radius:4px; padding:20px; width:100%; max-width:380px; box-shadow:4px 4px 0 #1a0a00; }
  .enc-title   { font-family:'Pirata One',cursive; color:#1a0a00; font-size:20px; text-align:center; margin-bottom:8px; }
  .enc-text    { font-family:'Lora',serif; font-style:italic; font-size:13px; color:#c0392b; margin:8px 0; padding-left:10px; border-left:3px solid #d4a017; line-height:1.5; }
  .choice-btn  { width:100%; padding:12px 16px; background:#fdf6e3; border:2px solid #1a0a00; border-radius:3px; display:flex; justify-content:space-between; align-items:center; margin-top:8px; transition:background 0.15s; }
  .choice-btn:active { background:#fff9e6; }
  .choice-label { font-family:'Cabin',sans-serif; font-weight:700; color:#1a0a00; font-size:13px; }
  .choice-berry { font-family:'Pirata One',cursive; color:#d4a017; font-size:13px; }

  /* ── Journal ── */
  .journal-entry { margin:0 14px 12px; background:#fdf6e3; border:2px solid #1a0a0022; border-radius:3px; padding:14px; box-shadow:2px 2px 0 #1a0a0011; }
  .journal-note  { font-family:'Lora',serif; font-style:italic; font-size:13px; color:#c0392b; border-left:3px solid #d4a017; padding-left:10px; margin-top:6px; }
  .empty-state   { text-align:center; font-family:'Lora',serif; font-style:italic; font-size:16px; color:#d4a017; padding:60px 20px; line-height:1.9; }

  /* ── Celebration ── */
  .celeb-screen { position:fixed; inset:0; background:radial-gradient(circle at 50% 40%,#1a2d4a,#0a1628); display:flex; align-items:center; justify-content:center; z-index:999; text-align:center; padding:20px; }
  .celeb-icon   { font-size:80px; }
  .celeb-title  { font-family:'Pirata One',cursive; font-size:36px; color:#d4a017; margin-top:16px; text-shadow:3px 3px 0 #c0392b; }
  .celeb-sub    { font-family:'Lora',serif; font-size:16px; color:#fdf6e399; margin-top:8px; font-style:italic; }

  /* ── API setup ── */
  .api-setup { padding:calc(env(safe-area-inset-top) + 60px) 20px 40px; }
  .api-setup h1 { font-family:'Pirata One',cursive; font-size:28px; color:#1a0a00; margin-bottom:6px; }
  .api-setup p  { font-family:'Lora',serif; font-size:15px; color:#1a0a00; line-height:1.6; margin-bottom:16px; }
  .api-hint  { background:#fff9e6; border:2px solid #d4a017; border-radius:3px; padding:14px 16px; margin-bottom:20px; }
  .api-hint-h { font-family:'Cabin',sans-serif; font-size:10px; font-weight:700; color:#c0392b; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
  .api-hint p { font-family:'Lora',serif; font-size:14px; color:#1a0a00; line-height:1.7; margin:0; white-space:pre-line; }

function addCustomExercise(name) {
  const custom = LS.get("gl_custom_ex") || [];
  const id = "custom_" + name.toLowerCase().replace(/\s+/g,"_") + "_" + Date.now();
  const ex = { id, name, cat:"Custom" };
  LS.set("gl_custom_ex", [...custom, ex]);
  return ex;

function getLastLift(exId, allW) {
  for(let i = allW.length-1; i>=0; i--) {
    const sets = allW[i].sets || [];
    const match = sets.filter(s=>s.exId===exId);
    if(match.length) return match[match.length-1];
  }
  return null;
}

function BriefingSection({ apiKey, onSelectWorkoutType }) {
  const todayArc    = getDailyArc();
  const briefing    = BRIEFINGS[todayArc?.id] || DEFAULT_BRIEFING;
  const crewMember  = CREW.find(c=>c.id===briefing.crew) || CREW[0];

  const [feed,     setFeed]     = useState([{type:"crew", cid:crewMember.id, text:briefing.line}]);
  const [input,    setInput]    = useState("");
  const [thinking, setThinking] = useState(false);
  const feedRef = useRef(null);

  useEffect(()=>{ if(feedRef.current) feedRef.current.scrollTop=feedRef.current.scrollHeight; },[feed,thinking]);

  async function sendMsg() {
    const text=input.trim(); if(!text||thinking) return;
    setInput("");
    setFeed(f=>[...f,{type:"player",text}]);
    if(!apiKey) {
      // static fallback — pick a random banter line from the crew member
      const b=BANTER[crewMember.id]||[];
      const pool=b.find(x=>x.at==="start")?.l||["Let's go!"];
      setTimeout(()=>setFeed(f=>[...f,{type:"crew",cid:crewMember.id,text:pick(pool)}]),700);
      return;
    }
    setThinking(true);
    try {
      const history=feed.map(f=>{
        if(f.type==="crew") return `${crewMember.name}: "${f.text}"`;
        if(f.type==="player") return `Ashley: "${f.text}"`;
        return "";
      }).filter(Boolean).join("\n");

      const sys=`You are ${crewMember.name} from One Piece, in the pre-mission briefing of a workout app called Grand Line.

Today's arc: "${todayArc?.title}" — ${todayArc?.desc}
Your role: ${crewMember.role}

You're motivating Ashley (a real person who's about to work out) before she picks her workout type for today. Stay completely in character. Be encouraging, specific to the arc, and genuine to how ${crewMember.name} actually talks.

Personality reminder:
${crewMember.id==="luffy"?"Simple, enthusiastic, food-obsessed, never gives up, inspires through action":
  crewMember.id==="zoro"?"Blunt, minimal words, about getting stronger, never gets lost mentally even if geographically":
  crewMember.id==="nami"?"Sharp, navigator brain, weather metaphors, talks about odds and charts, actually caring":
  crewMember.id==="usopp"?"Cowardly but brave, tall tales, calls himself a great warrior, deeply loyal":
  crewMember.id==="franky"?"SUPER enthusiastic, cola-powered, engineering metaphors, builds things, everything is SUPER":
  crewMember.id==="robin"?"Calm, dark wit, fufufu, archaeological references, warm underneath":
  crewMember.id==="yamato"?"Oden-obsessed, overly enthusiastic, wants to be a samurai, huge energy":
  crewMember.id==="jinbe"?"Calm, sea metaphors, helmsman wisdom, deeply honourable, measured":
  crewMember.id==="brook"?"Skeleton jokes, yohohoho, music references, surprisingly wise and warm":
  "Passionate, in character, encouraging"}

Keep response to 1-3 sentences. React naturally to what Ashley said. Do not break character. No JSON needed — just speak as ${crewMember.name}.`;

      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,system:sys,messages:[
          ...feed.map(f=>({role:f.type==="player"?"user":"assistant",content:f.type==="player"?f.text:f.text})),
          {role:"user",content:text}
        ]})
      });
      const data=await res.json();
      if(data.error) throw new Error(data.error.message);
      const reply=data.content?.[0]?.text||"...";

function QuestView({ mission, crewIds, gs, apiKey, onFinish, onAbandon, selectedExercises, onSaveSets }) {
  const milestones = getMilestones(mission.id, mission.type);
  const crewObjs   = crewIds.map(id=>CREW.find(c=>c.id===id)).filter(Boolean);
  const exercises  = getExercises().filter(e=>selectedExercises.includes(e.id));

  const banterFeed = [];
  crewIds.forEach(id=>{ const b=BANTER[id]||[]; b.forEach(({at,l})=>banterFeed.push({id,at,line:pick(l)})); });
  const events = [...SEA_EVENTS].sort(()=>Math.random()-0.5).slice(0,2);

  const [msIdx,    setMsIdx]    = useState(0);
  const [feed,     setFeed]     = useState([]);
  const [elapsed,  setElapsed]  = useState(0);
  const [bonusXP,  setBonusXP]  = useState(0);
  const [event,    setEvent]    = useState(null);
  const [evDone,   setEvDone]   = useState([]);
  const [input,    setInput]    = useState("");
  const [thinking, setThinking] = useState(false);
  const [logOpen,  setLogOpen]  = useState(false);
  const [logEx,    setLogEx]    = useState(exercises[0]?.id||null);
  const [logKg,    setLogKg]    = useState("");
  const [logReps,  setLogReps]  = useState("");
  const [sets,     setSets]     = useState([]);
  const [setCount, setSetCount] = useState({});
  const feedRef = useRef(null);

  const addFeed = useCallback(item=>setFeed(f=>[...f,{...item,fid:Date.now()+Math.random()}]),[]);

  useEffect(()=>{ const t=setInterval(()=>setElapsed(e=>e+1),1000); return()=>clearInterval(t); },[]);

  useEffect(()=>{
    const ts=[
      setTimeout(()=>{ const m=banterFeed.find(b=>b.at==="start"); if(m) addFeed({type:"banter",cid:m.id,text:m.line}); },3000),
      setTimeout(()=>{ const ms=banterFeed.filter(b=>b.at==="mid"); if(ms.length){ const m=pick(ms); addFeed({type:"banter",cid:m.id,text:m.line}); } },90000),
      setTimeout(()=>{ const ms=banterFeed.filter(b=>b.at==="push"); if(ms.length){ const m=pick(ms); addFeed({type:"banter",cid:m.id,text:m.line}); } },240000),
      setTimeout(()=>{ if(!evDone.includes(0)&&events[0]) setEvent({...events[0],idx:0}); },120000),
      setTimeout(()=>{ if(!evDone.includes(1)&&events[1]) setEvent({...events[1],idx:1}); },300000),
    ];
    return()=>ts.forEach(clearTimeout);
  },[]);

  useEffect(()=>{ if(feedRef.current) feedRef.current.scrollTop=feedRef.current.scrollHeight; },[feed,thinking]);

  async function sendMsg() {
    const text=input.trim(); if(!text||thinking) return;
    setInput(""); addFeed({type:"player",text});
    if(!apiKey) {
      const ms=banterFeed.filter(b=>b.at==="mid");
      if(ms.length){ const m=pick(ms); setTimeout(()=>addFeed({type:"banter",cid:m.id,text:m.line}),700); }
      return;
    }
    setThinking(true);
    try {
      const phase=msIdx===0?"just setting sail":msIdx>=milestones.length-1?"almost done, final push":`${msIdx} of ${milestones.length} milestones complete`;
      const recent=feed.slice(-6).map(f=>{
        if(f.type==="player") return `Ashley: "${f.text}"`;
        if(f.type==="banter"){ const c=CREW.find(x=>x.id===f.cid); return c?`${c.name}: "${f.text}"`:""; }
        return "";
      }).filter(Boolean).join("\n");

      const sys=`You are the crew voice system for a One Piece themed workout app.

Ashley is a pirate doing a real workout: "${mission.title}" — ${mission.desc}
Mission phase: ${phase}. Time elapsed: ${Math.floor(elapsed/60)} minutes.
Her crew: ${crewObjs.map(c=>`${c.name} (${c.role})`).join(", ")}
Recent chat:\n${recent||"(mission just started)"}

Respond as 1-2 crew members. Stay TRUE to One Piece personality:
- Luffy: simple, enthusiastic, food-obsessed, genuinely inspiring, never gives up
- Zoro: blunt, minimalist, about getting stronger, naps, gets lost
- Nami: sharp, weather/navigation focused, talks about money, actually caring
- Usopp: cowardly but brave when it counts, tall tales, deeply loyal
- Sanji: chivalrous to women, cooking metaphors, kicks things, flirtatious
- Chopper: excited doctor, hates compliments, loves them, medical observations
- Robin: calm, dark humour, archaeological references, "fufufu"
- Franky: SUPER, cola-powered, engineering enthusiasm, builds things
- Brook: skeleton jokes, music references, yohohoho, surprisingly wise
- Jinbe: calm, helmsman wisdom, sea metaphors, deeply honourable
- Yamato: Oden-obsessed, overly enthusiastic, wants to be a samurai
- Vivi: warm, encouraging, references Alabasta, genuinely caring

Only use crew IN this party: ${crewObjs.map(c=>c.name).join(", ")}.

Respond ONLY as JSON, no markdown:
{"responses":[{"crew":"Name","text":"what they say"}]}

React to what Ashley said. Match the character's voice exactly.`;

      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:sys,messages:[{role:"user",content:`Ashley says: "${text}"`}]})
      });
      const data=await res.json();
      if(data.error) throw new Error(data.error.message);
      let parsed;
      try{ parsed=JSON.parse(data.content?.[0]?.text||"{}"); }catch{ parsed={responses:[{crew:crewObjs[0]?.name,text:data.content?.[0]?.text||"..."}]}; }
      (parsed.responses||[]).forEach((r,i)=>{
        const comp=CREW.find(c=>c.name===r.crew);
        setTimeout(()=>addFeed({type:"banter",cid:comp?.id||crewIds[0],text:r.text}),i*800);
      });
    } catch(err) {
      addFeed({type:"sys",text:`[Den Den Mushi disconnected: ${err.message}]`});
    } finally { setThinking(false); }
  }

  function advance() {
    const ms=milestones[msIdx];
    addFeed({type:"ms",label:ms.l,text:ms.s});
    const next=msIdx+1; setMsIdx(next);
    if(next>=milestones.length) {
      setTimeout(()=>{ const ms=banterFeed.filter(b=>b.at==="done"); if(ms.length){ const m=pick(ms); addFeed({type:"banter",cid:m.id,text:m.line}); } },800);
    } else if(next===2) {
      setTimeout(()=>{ const ms=banterFeed.filter(b=>b.at==="push"); if(ms.length){ const m=pick(ms); addFeed({type:"banter",cid:m.id,text:m.line}); } },600);
    }
  }

  function logSet() {
    if(!logEx||!logKg||!logReps) return;
    const ex = exercises.find(e=>e.id===logEx);
    const setNum = (setCount[logEx]||0) + 1;
    const setObj = { exId:logEx, exName:ex?.name||logEx, kg:parseFloat(logKg), reps:parseInt(logReps), setNum };
    setSets(s=>[...s, setObj]);
    setSetCount(c=>({...c,[logEx]:setNum}));
    addFeed({type:"set", ...setObj});
    setLogKg(""); setLogReps(""); setLogOpen(false);
  }

  function resolveEvent(choice,idx) {
    addFeed({type:"enc_res",text:choice.out});
    setBonusXP(b=>b+choice.xp);
    setEvDone(d=>[...d,idx]);
    setEvent(null);
  }

  const done=msIdx>=milestones.length;
  const mins=Math.floor(elapsed/60), secs=elapsed%60;
  const curMs=milestones[msIdx];

  return h('div',{class:"quest-view"},
    h('div',{class:"quest-header"},
      h('div',{class:"row",style:"margin-bottom:8px"},
        h('div',{style:"flex:1;min-width:0"},

/* ═══════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════ */
function App() {
  const [gs, setGs]         = useState(()=>{ const s=LS.get("gl_v1"); return s?{...initState(),...s}:initState(); });
  const [view, setView]     = useState("home");
  const [apiKey, setApiKey] = useState(()=>{ try{ return localStorage.getItem("gl_apikey")||""; }catch{ return ""; } });
  const [celebrating, setCelebrating] = useState(false);
  const [showApi, setShowApi]         = useState(false);

  const [activeMission,  setActiveMission]  = useState(null);
  const [activeCrew,     setActiveCrew]     = useState([]);
  const [questBonus,     setQuestBonus]     = useState(0);
  const [questPhase,     setQuestPhase]     = useState("pick");
  const [activeExercises,setActiveExercises]= useState([]);
  const [activeSets,     setActiveSets]     = useState([]);

  useEffect(()=>{ LS.set("gl_v1",gs); },[gs]);

  useEffect(()=>{
    if(gs.weekKey!==weekKey()){
      const done=gs.weekW.length;
      const newStreak=done>=4?gs.streak+1:0;
      const injured=done<4?[...new Set(gs.weekW.flatMap(w=>w.crewIds||[]))].slice(0,4-done):[];
      setGs(prev=>{
        const ch={...prev.ch};
        injured.forEach(id=>{ if(ch[id]) ch[id]={...ch[id],hp:Math.max(20,ch[id].hp-30),status:"injured"}; });
        return {...prev,weekKey:weekKey(),weekW:[],streak:newStreak,best:Math.max(newStreak,prev.best),ch};
      });
    }
  },[]);

  function saveKey(k) {
    try{ localStorage.setItem("gl_apikey",k); }catch{}
    setApiKey(k); setShowApi(false);
  }

  function startMission(mission) {
    setActiveMission(mission); setActiveCrew([]); setQuestBonus(0);
    setQuestPhase("pick"); setView("mission_flow");
  }

  function onSelectWorkoutType(typeId) {
    const arc = getDailyArc();
    const wt = WORKOUT_TYPES.find(w=>w.id===typeId);
    // Build a mission object from the arc + chosen workout type
    const mission = {
      ...arc,
      type: typeId,
      desc: arc.desc[typeId] || arc.desc.strength,
      criteria: arc.criteria[typeId] || arc.criteria.strength,
    };
    startMission(mission);
  }

  function onCrewConfirmed(crew) { setActiveCrew(crew); setQuestPhase(activeMission.type==="strength" ? "loadout" : "quest"); }
  function onLoadoutConfirmed(exIds) { setActiveExercises(exIds); setQuestPhase("quest"); }
  function onSaveSets(sets) { setActiveSets(sets); }
  function onQuestFinished(bonus) { setQuestBonus(bonus); setQuestPhase("log"); }

  function onMissionComplete(effort, notes, totalXP) {
    const ef=EFFORT.find(e=>e.v===effort);
    const workout={
      id:Date.now(), date:new Date().toISOString(),
      cid:activeMission.id, title:activeMission.title, icon:activeMission.icon,
      crewIds:activeCrew, effort, notes, xp:totalXP, day:todayIdx(),
      sets:activeSets, type:activeMission.type
    };
    setGs(prev=>{
      const ch={...prev.ch};
      activeCrew.forEach(id=>{
        if(ch[id]){ const nx=ch[id].xp+Math.round(20*(ef?.mult||1)); ch[id]={...ch[id],hp:Math.min(100,ch[id].hp+15),xp:nx,level:Math.floor(nx/200)+1,status:"ready"}; }
      });
      const cxp=prev.char.xp+totalXP;
      const newBounty=prev.char.bounty+totalXP*50000;
      return {...prev,weekW:[...prev.weekW,workout],allW:[...prev.allW,workout],ch,char:{...prev.char,xp:cxp,level:Math.floor(cxp/500)+1,total:prev.char.total+1,bounty:newBounty}};
    });
    setCelebrating(true);
    setTimeout(()=>{ setCelebrating(false); setView("home"); setQuestPhase("pick"); },2800);
  }

  if(celebrating) return h(Celebration);
  if(showApi)     return h('div',{style:"height:100%;display:flex;flex-direction:column"},h(ApiSetup,{currentKey:apiKey,onSave:saveKey,onCancel:()=>setShowApi(false)}));

  const mainView=()=>{
    if(view==="mission_flow"){
      if(questPhase==="pick")    return h(PickCrewView,{mission:activeMission,gs,onConfirm:onCrewConfirmed,onBack:()=>setView("home")});
      if(questPhase==="loadout") return h(ExerciseLoadoutView,{gs,onConfirm:onLoadoutConfirmed,onBack:()=>setQuestPhase("pick")});
      if(questPhase==="quest")   return h(QuestView,{mission:activeMission,crewIds:activeCrew,gs,apiKey,onFinish:onQuestFinished,onAbandon:()=>setView("home"),selectedExercises:activeExercises,onSaveSets});
      if(questPhase==="log")     return h(LogView,{mission:activeMission,crewIds:activeCrew,bonusXP:questBonus,onComplete:onMissionComplete,onBack:()=>setQuestPhase("quest")});
    }
    if(view==="party")   return h(CrewView,{gs});
    if(view==="journal") return h(JournalViewComp,{gs});
    return h(HomeView,{gs,setGs,startMission,apiKey,onSelectWorkoutType});
  };

  const navView=view==="mission_flow"?"home":view;
  return h('div',{style:"height:100%;display:flex;flex-direction:column"},
    mainView(),
    view!=="mission_flow"&&h(NavBar,{view:navView,setView,hasKey:!!apiKey,onApiSetup:()=>setShowApi(true)})
  );
}

render(h(App), document.getElementById('app'));
</script>
